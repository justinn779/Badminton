<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>&#30403;&#21592;&#19978;&#22580;&#35336;&#25976;&#22120;</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--p:#2563eb;--s:#16a34a;--d:#dc2626;--bg:#f1f5f9;--c:#fff;--t:#1e293b;--m:#64748b;--b:#e2e8f0;--r:12px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--t);min-height:100vh}
header{background:var(--p);color:#fff;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2)}
header h1{font-size:1.1rem;font-weight:700}
.tabs{display:flex;gap:6px}
.tab-btn{background:rgba(255,255,255,.2);color:#fff;border:none;border-radius:20px;padding:6px 14px;font-size:.85rem;cursor:pointer}
.tab-btn.active{background:rgba(255,255,255,.9);color:var(--p);font-weight:700}
.sync-bar{background:#1e3a5f;color:#93c5fd;font-size:.78rem;padding:5px 20px;display:flex;align-items:center;gap:8px;min-height:28px}
.dot{width:7px;height:7px;border-radius:50%;background:#94a3b8;flex-shrink:0}
.dot.ok{background:#4ade80}.dot.err{background:#f87171}.dot.go{background:#fbbf24;animation:p .8s infinite}
@keyframes p{0%,100%{opacity:1}50%{opacity:.4}}
.view{display:none;padding:16px 16px 80px}.view.active{display:block}
.card{background:var(--c);border-radius:var(--r);padding:16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border:none;border-radius:8px;padding:10px 18px;font-size:.9rem;font-weight:600;cursor:pointer;transition:opacity .15s,transform .1s;-webkit-tap-highlight-color:transparent}
.btn:active{transform:scale(.96);opacity:.85}
.bp{background:var(--p);color:#fff}.bs{background:var(--s);color:#fff}.bd{background:var(--d);color:#fff}
.bo{background:transparent;color:var(--p);border:2px solid var(--p)}
.add-row{display:flex;gap:8px;margin-bottom:16px}
.add-row input{flex:1;padding:10px 14px;border:2px solid var(--b);border-radius:8px;font-size:1rem;outline:none}
.add-row input:focus{border-color:var(--p)}
.pi{display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid var(--b)}
.pi:last-child{border-bottom:none}
.pck{width:22px;height:22px;accent-color:var(--p);cursor:pointer;flex-shrink:0}
.pn{flex:1;font-size:1rem}
.pd{background:none;border:none;color:var(--d);font-size:1.2rem;cursor:pointer;padding:4px 8px}
.eh{text-align:center;color:var(--m);padding:32px 0;font-size:.95rem}
.sar{display:flex;align-items:center;gap:10px;padding:8px 0 12px;font-size:.9rem;color:var(--m)}
.sar input{width:20px;height:20px;accent-color:var(--p);cursor:pointer}
.gg{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px}
.gc{background:var(--c);border-radius:var(--r);padding:16px 12px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.06);display:flex;flex-direction:column;align-items:center;gap:10px}
.gn{font-size:1rem;font-weight:600;word-break:break-all}
.gct{font-size:2.8rem;font-weight:800;color:var(--p);line-height:1;transition:transform .2s}
.cr{display:flex;align-items:center;gap:8px}
.cb{width:44px;height:44px;border:none;border-radius:50%;font-size:1.4rem;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent;display:flex;align-items:center;justify-content:center}
.cp{background:var(--s);color:#fff;width:52px;height:52px;font-size:1.8rem}
.cm{background:#f1f5f9;color:var(--t);border:2px solid var(--b)}
.sb{display:flex;gap:16px;flex-wrap:wrap;font-size:.9rem;color:var(--m);margin-bottom:12px;padding:10px 14px;background:var(--c);border-radius:var(--r)}
.sb strong{color:var(--t)}
.fab{position:fixed;bottom:20px;left:0;right:0;display:flex;justify-content:center;pointer-events:none}
.fab .btn{pointer-events:all;box-shadow:0 4px 16px rgba(0,0,0,.25);padding:14px 32px;font-size:1rem;border-radius:30px}
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center}
.mo.show{display:flex}
.mb{background:#fff;border-radius:var(--r);padding:24px;max-width:320px;width:90%;text-align:center}
.mb h2{font-size:1.1rem;margin-bottom:8px}
.mb p{color:var(--m);font-size:.9rem;margin-bottom:20px}
.ma{display:flex;gap:10px}
.ma .btn{flex:1}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:#1e293b;color:#fff;padding:10px 20px;border-radius:20px;font-size:.9rem;opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;white-space:nowrap;z-index:300}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:400px){.gg{grid-template-columns:repeat(2,1fr)}.gct{font-size:2.2rem}}
</style>
</head>
<body>
<header>
<h1>&#9917; &#30403;&#21592;&#35336;&#25976;&#22120;</h1>
<div class="tabs">
<button class="tab-btn active" onclick="switchTab('manage')">&#30403;&#21592;&#31649;&#29702;</button>
<button class="tab-btn" onclick="switchTab('game')">&#20170;&#26085;&#27604;&#36093;</button>
</div>
</header>
<div class="sync-bar"><div class="dot" id="sd"></div><span id="sm">&#36899;&#32267;&#20013;&#8230;</span></div>
<div id="vm" class="view active">
<div class="card">
<div class="add-row">
<input id="nn" type="text" placeholder="&#36664;&#20837;&#30403;&#21592;&#23461;&#21517;&#8230;" maxlength="20" onkeydown="if(event.key==='Enter')addPlayer()"/>
<button class="btn bp" onclick="addPlayer()">&#26032;&#22686;</button>
</div>
<div class="sar">
<input type="checkbox" id="ca" onchange="toggleAll(this.checked)"/>
<label for="ca">&#20840;&#36984; / &#21462;&#28040;&#20840;&#36984;</label>
<span id="sc" style="margin-left:auto"></span>
</div>
<div id="pl"></div>
</div>
</div>
<div id="vg" class="view">
<div class="sb" id="bar"></div>
<div class="gg" id="grid"></div>
<div style="margin-top:16px">
<button class="btn bo" onclick="showReset()">&#37325;&#32622;&#20170;&#26085;&#27425;&#25578;</button>
</div>
</div>
<div class="fab" id="fab"><button class="btn bs" onclick="startGame()">&#9654; &#38283;&#22987;&#20170;&#26085;&#27604;&#36093;</button></div>
<div class="mo" id="rm">
<div class="mb">
<h2>&#30906;&#35469;&#37325;&#32622;&#65311;</h2>
<p>&#23558;&#28165;&#38500;&#25152;&#26377;&#30403;&#21592;&#20170;&#26085;&#30340;&#19978;&#22580;&#27425;&#25578;&#65292;&#28961;&#27861;&#24460;&#24481;&#12290;</p>
<div class="ma">
<button class="btn bo" onclick="hideReset()">&#21462;&#28040;</button>
<button class="btn bd" onclick="resetCounts()">&#30906;&#35469;&#37325;&#32622;</button>
</div>
</div>
</div>
<div class="toast" id="toast"></div>
<script>
var GID='915509b4ce537da97c758d27f2172416',_a='ghp_epRpeKt4zDC1Q',_b='FgURZAlYJWZP9Utvy1dW3hA',GT=_a+_b,GF='players.json';
var players=[],gc={},tab='manage',st=null;
function ss(s,m){document.getElementById('sd').className='dot '+s;document.getElementById('sm').textContent=m;}
async function pull(){
  ss('go','...');
  try{
    var r=await fetch('https://api.github.com/gists/'+GID,{headers:{'Authorization':'Bearer '+GT}});
    if(!r.ok)throw 0;
    var d=await r.json(),c=d.files[GF]&&d.files[GF].content;
    if(c){var p=JSON.parse(c);players=p.players||[];gc=p.gameCounts||{};}
    ss('ok','&#24050;&#21516;&#27493; v');
  }catch(e){ss('err','&#30000;&#32254;&#22833;&#25215;');ll();}
  rm();if(tab==='game')rg();
}
async function push(){
  ss('go','...');
  try{
    var r=await fetch('https://api.github.com/gists/'+GID,{
      method:'PATCH',
      headers:{'Authorization':'Bearer '+GT,'Content-Type':'application/json'},
      body:JSON.stringify({files:{[GF]:{content:JSON.stringify({players:players,gameCounts:gc},null,2)}}})
    });
    if(!r.ok)throw 0;
    sl();ss('ok','&#24050;&#21516;&#27493; v');
  }catch(e){sl();ss('err','&#22833;&#25215;');}
}
function sl(){localStorage.setItem('pp',JSON.stringify(players));localStorage.setItem('pc',JSON.stringify(gc));}
function ll(){try{var p=localStorage.getItem('pp'),c=localStorage.getItem('pc');if(p)players=JSON.parse(p);if(c)gc=JSON.parse(c);}catch(e){}}
function save(){sl();clearTimeout(st);st=setTimeout(push,1200);}
function switchTab(t){
  tab=t;
  document.querySelectorAll('.tab-btn').forEach(function(b,i){b.classList.toggle('active',['manage','game'][i]===t);});
  document.getElementById('vm').classList.toggle('active',t==='manage');
  document.getElementById('vg').classList.toggle('active',t==='game');
  document.getElementById('fab').style.display=t==='manage'?'':'none';
  if(t==='game')rg();
}
function addPlayer(){
  var inp=document.getElementById('nn'),name=inp.value.trim();
  if(!name)return;
  if(players.find(function(p){return p.name===name;})){toast('&#37325;&#35206;');return;}
  var id=Date.now()+'';
  players.push({id:id,name:name,selected:true});gc[id]=0;
  inp.value='';save();rm();inp.focus();
}
function delP(id){players=players.filter(function(p){return p.id!==id;});delete gc[id];save();rm();}
function togP(id,v){var p=players.find(function(p){return p.id===id;});if(p)p.selected=v;save();rm();}
function toggleAll(v){players.forEach(function(p){p.selected=v;});save();rm();}
function rm(){
  var list=document.getElementById('pl'),sc=document.getElementById('sc'),ca=document.getElementById('ca');
  if(!players.length){list.innerHTML='<div class="eh">&#23578;&#26410;&#26032;&#22686;&#20219;&#20309;&#30403;&#21592;</div>';sc.textContent='';ca.checked=ca.indeterminate=false;return;}
  var sel=players.filter(function(p){return p.selected;}).length;
  sc.textContent='&#24050;&#36984; '+sel+' / '+players.length;
  ca.checked=sel===players.length;ca.indeterminate=sel>0&&sel<players.length;
  list.innerHTML=players.map(function(p){
    return '<div class="pi"><input type="checkbox" class="pck" '+(p.selected?'checked':'')+' onchange="togP(''+p.id+'',this.checked)"/><span class="pn">'+esc(p.name)+'</span><button class="pd" onclick="delP(''+p.id+'')">X</button></div>';
  }).join('');
}
function startGame(){if(!players.filter(function(p){return p.selected;}).length){toast('&#35531;&#20808;&#21028;&#36984;&#30403;&#21592;');return;}switchTab('game');}
function rg(){
  var active=players.filter(function(p){return p.selected;}),grid=document.getElementById('grid'),bar=document.getElementById('bar');
  if(!active.length){grid.innerHTML='<div class="eh" style="grid-column:1/-1">&#35531;&#20808;&#21028;&#36984;&#30403;&#21592;</div>';bar.innerHTML='';return;}
  var total=active.reduce(function(s,p){return s+(gc[p.id]||0);},0);
  var maxP=active.reduce(function(m,p){return (gc[p.id]||0)>(gc[m.id]||0)?p:m;},active[0]);
  bar.innerHTML='<span>&#20154;&#25976; <strong>'+active.length+'</strong></span><span>&#24635; <strong>'+total+'</strong></span>'+(total>0?'<span>&#26368;&#22810; <strong>'+esc(maxP.name)+'</strong> ('+(gc[maxP.id]||0)+')</span>':'');
  grid.innerHTML=active.map(function(p){
    var cnt=gc[p.id]||0;
    return '<div class="gc"><div class="gn">'+esc(p.name)+'</div><div class="gct" id="c'+p.id+'">'+cnt+'</div><div class="cr"><button class="cb cm" onclick="adj(''+p.id+'',-1)">-</button><button class="cb cp" onclick="adj(''+p.id+'',1)">+</button></div></div>';
  }).join('');
}
function adj(id,d){
  gc[id]=Math.max(0,(gc[id]||0)+d);save();
  var el=document.getElementById('c'+id);
  if(el){el.textContent=gc[id];el.style.transform='scale(1.35)';setTimeout(function(){el.style.transform='scale(1)';},180);}
  ub();
}
function ub(){
  var active=players.filter(function(p){return p.selected;});if(!active.length)return;
  var total=active.reduce(function(s,p){return s+(gc[p.id]||0);},0);
  var maxP=active.reduce(function(m,p){return (gc[p.id]||0)>(gc[m.id]||0)?p:m;},active[0]);
  document.getElementById('bar').innerHTML='<span>&#20154;&#25976; <strong>'+active.length+'</strong></span><span>&#24635; <strong>'+total+'</strong></span>'+(total>0?'<span>&#26368;&#22810; <strong>'+esc(maxP.name)+'</strong> ('+(gc[maxP.id]||0)+')</span>':'');
}
function showReset(){document.getElementById('rm').classList.add('show');}
function hideReset(){document.getElementById('rm').classList.remove('show');}
function resetCounts(){players.forEach(function(p){gc[p.id]=0;});save();hideReset();rg();toast('&#24050;&#37325;&#32622;');}
var tt;
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(tt);tt=setTimeout(function(){t.classList.remove('show');},2200);}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
ll();rm();pull();
setInterval(pull,30000);
</script>
</body>
</html>
